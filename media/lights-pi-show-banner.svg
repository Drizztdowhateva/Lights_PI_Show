<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Lights PI Show Banner</title>
  <desc id="desc">Gradient banner with LED style circles and project title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1022" />
      <stop offset="100%" stop-color="#1d3b5e" />
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)" />
  <g opacity="0.35">
    <circle cx="140" cy="120" r="56" fill="#22d3ee" />
    <circle cx="260" cy="95" r="34" fill="#f97316" />
    <circle cx="340" cy="160" r="40" fill="#a78bfa" />
    <circle cx="1010" cy="300" r="52" fill="#34d399" />
    <circle cx="1080" cy="220" r="30" fill="#f43f5e" />
    <circle cx="920" cy="150" r="22" fill="#facc15" />
  </g>
  <rect x="90" y="78" width="1020" height="264" rx="22" fill="#0b1228" opacity="0.72" />
  <rect x="90" y="78" width="1020" height="264" rx="22" fill="none" stroke="url(#glow)" stroke-width="4" />
  <text x="130" y="190" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="72" fill="#f8fafc" font-weight="700">Lights PI Show</text>
  <text x="132" y="242" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="28" fill="#cbd5e1">Keyboard-driven WS281X pattern runner with safe test mode and headless configs</text>
</svg>
